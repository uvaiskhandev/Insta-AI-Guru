<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Insta AI Guru</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body">
  <div class="dashboard-wrap">
    <header class="dashboard-header">
      <div>
        <h1>Insta AI Guru Admin</h1>
        <p class="sub">Private analytics dashboard</p>
      </div>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <h3>Total Events</h3>
        <p id="totalEvents">0</p>
      </div>
      <div class="stat-card">
        <h3>Today Events</h3>
        <p id="todayEvents">0</p>
      </div>
      <div class="stat-card">
        <h3>Page Views</h3>
        <p id="pageViews">0</p>
      </div>
      <div class="stat-card">
        <h3>Caption Uses</h3>
        <p id="captionUses">0</p>
      </div>
      <div class="stat-card">
        <h3>Bio Uses</h3>
        <p id="bioUses">0</p>
      </div>
      <div class="stat-card">
        <h3>Hashtag Uses</h3>
        <p id="hashtagUses">0</p>
      </div>
      <div class="stat-card">
        <h3>Copy Clicks</h3>
        <p id="copyClicks">0</p>
      </div>
      <div class="stat-card">
        <h3>Top Referrer</h3>
        <p id="topReferrer">-</p>
      </div>
    </section>

    <section class="table-section">
      <h2>Top Pages</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Page</th>
              <th>Count</th>
            </tr>
          </thead>
          <tbody id="topPagesBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
