<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Insta AI Guru</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      padding: 24px;
    }

    .admin-panel {
      max-width: 1100px;
      margin: 0 auto;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .admin-topbar h1 {
      margin: 0;
      font-size: 30px;
    }

    .logout-btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4d4d, #7a5cff);
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .admin-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .admin-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      opacity: 0.8;
    }

    .admin-card .value {
      font-size: 30px;
      font-weight: 800;
    }

    .admin-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(14px);
    }

    .admin-box h2 {
      margin-top: 0;
    }

    .admin-note {
      opacity: 0.75;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="admin-panel">
    <div class="admin-topbar">
      <h1>Admin Dashboard</h1>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <div class="admin-grid">
      <div class="admin-card">
        <h3>Total Visits</h3>
        <div class="value" id="totalRequests">--</div>


      <div class="admin-card">
        <h3>Total Prompt Requests</h3>
        <div class="value" id="todayRequests">--</div>

      <div class="admin-card">
        <h3>Active Users</h3>
        <div class="value" id="todayRequests">--</div>

      <div class="admin-card">
        <h3>Credits Used</h3>
       <div class="value" id="todayRequests">--</div>
    </div>

    <div class="admin-box">
      <h2>Admin Area Ready</h2>
      <p class="admin-note">
        Abhi ye secure admin entry ke saath ready hai. Iske baad hum isme analytics,
        prompt history, users, credits aur traffic data connect karenge.
      </p>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
