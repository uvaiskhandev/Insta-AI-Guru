<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Insta AI Guru</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .admin-login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .admin-login-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .admin-login-card h1 {
      margin: 0 0 10px;
      font-size: 28px;
      text-align: center;
    }

    .admin-login-card p {
      margin: 0 0 22px;
      text-align: center;
      opacity: 0.8;
    }

    .admin-field {
      margin-bottom: 16px;
    }

    .admin-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .admin-field input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      font-size: 15px;
      box-sizing: border-box;
    }

    .admin-field input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .admin-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #ff4d4d, #7a5cff);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .admin-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .admin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .admin-error {
      min-height: 22px;
      margin-top: 14px;
      text-align: center;
      color: #ff8f8f;
      font-size: 14px;
    }

    .back-home {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      color: inherit;
      opacity: 0.8;
    }

    .back-home:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <h1>Admin Login</h1>
      <p>Only authorized access allowed</p>

      <form id="adminLoginForm">
        <div class="admin-field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required />
        </div>

        <div class="admin-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="admin-btn" id="loginBtn">Login</button>
        <div class="admin-error" id="loginError"></div>
      </form>

      <a href="/" class="back-home">← Back to website</a>
    </div>
  </div>

  <script src="admin-login.js"></script>
</body>
</html>
