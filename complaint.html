<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complaint / Suggestion - Insta AI Guru</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  background:#09090f;
  font-family: 'Inter', sans-serif;
  color:white;
}

.container {
  max-width: 900px;
  margin:auto;
  padding:40px 20px;
}

.form-box {
  background: rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(10px);
}

input, textarea, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button {
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Complaint / Suggestion</h1>
  <p>Help us improve Insta AI Guru.</p>

  <div class="form-box">
    <form>
      <label>Type</label>
      <select>
        <option>Complaint</option>
        <option>Suggestion</option>
        <option>Bug Report</option>
      </select>

      <label>Name</label>
      <input type="text" placeholder="Your Name">

      <label>Email</label>
      <input type="email" placeholder="Your Email">

      <label>Details</label>
      <textarea rows="5" placeholder="Describe your issue or suggestion..."></textarea>

      <button type="submit">Submit</button>
    </form>
  </div>
</div>

</body>
</html>
