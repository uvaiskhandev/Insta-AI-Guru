<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Insta AI Guru</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  background:#09090f;
  font-family: 'Inter', sans-serif;
  color:white;
}

.container {
  max-width: 900px;
  margin:auto;
  padding:40px 20px;
}

.form-box {
  background: rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(10px);
}

input, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

button {
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff004c,#ff7a00);
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>Contact Us</h1>
  <p>Have questions or business inquiries? Send us a message.</p>

  <div class="form-box">
    <form>
      <label>Name</label>
      <input type="text" placeholder="Your Name" required>

      <label>Email</label>
      <input type="email" placeholder="Your Email" required>

      <label>Message</label>
      <textarea rows="5" placeholder="Write your message..." required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</div>

</body>
</html>
