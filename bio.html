<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Generator | Insta AI Guru PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-bg"></div>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fa-solid fa-fire"></i><span>Insta</span>AI Guru
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="caption.html" class="nav-link">Captions</a>
            <a href="hashtags.html" class="nav-link">Hashtags</a>
            <a href="bio.html" class="nav-link active">Bios</a>
            <a href="reel-ideas.html" class="nav-link">Reels</a>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Light/Dark Mode">
                <i class="fa-solid fa-sun"></i>
            </button>
            <div class="credit-badge" id="credit-count">
                <i class="fa-solid fa-bolt"></i> -- Credits
            </div>
            <button class="mobile-menu-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
    </nav>

    <main class="section" style="padding-top: 8rem;">
        <div class="section-header reveal">
            <h1 class="text-gradient">Bio Optimizer</h1>
            <p>Turn profile visits into loyal followers with a magnetic bio.</p>
        </div>

        <div class="generator-layout reveal">
            <div class="glass-panel generator-form">
                <form id="generate-form" data-mode="bio">
                    <div class="form-group">
                        <label for="niche">Your Niche / Profession</label>
                        <input type="text" id="niche" name="niche" class="form-control" placeholder="e.g., UI/UX Designer, Fitness Coach" required>
                    </div>

                    <div class="form-group">
                        <label for="details">Key Details / CTA</label>
                        <textarea id="details" name="details" class="form-control" placeholder="e.g., Helping beginners code. Join my free masterclass below!"></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="tone">Style</label>
                            <select id="tone" name="tone" class="form-control">
                                <option value="professional">Professional & Clean</option>
                                <option value="creative">Creative & Fun</option>
                                <option value="minimalist">Minimalist</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="emojis">Include Emojis?</label>
                            <select id="emojis" name="emojis" class="form-control">
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        <i class="fa-solid fa-user-pen"></i> Generate Bio
                    </button>
                </form>
            </div>

            <div class="generator-result-area">
                <div class="glass-panel result-card">
                    <div class="result-header">
                        <h3>Profile Bios</h3>
                    </div>
                    <div class="loader" id="loader"></div>
                    <div id="result-content" class="result-content"></div>
                    <div class="empty-state" id="empty-state">
                        <i class="fa-solid fa-user"></i>
                        <p>Fill out the form to craft your perfect first impression.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
